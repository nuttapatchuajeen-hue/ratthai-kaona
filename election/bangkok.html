<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>(function(){try{var k='md-theme',t=localStorage.getItem(k);if(t!=='light'&&t!=='dark')t=(window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<title>เลือกตั้ง กทม. 2569 · ผู้ว่าฯ + ส.ก. 50 เขต · แผนที่ผลคะแนน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="../css/bb8-toggle.css">
<style>
/* ===== BANGKOK ELECTION PAGE ===== */
.pwrap{max-width:1190px;margin:0 auto;padding:84px 20px 96px}
@media(max-width:860px){.pwrap{padding:16px 12px 110px}}

.phead{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.phead .pico{width:46px;height:46px;flex:0 0 auto}
.phead .bt{font-family:'Kanit';font-weight:600;font-size:1.25rem;line-height:1.1}
.phead .bt small{display:block;font-family:'Sarabun';font-weight:400;font-size:.74rem;color:var(--muted)}
.tabs{display:flex;gap:4px;margin-left:auto;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:5px;box-shadow:var(--shadow)}
.tabs button{font-family:'Kanit';font-weight:500;font-size:.9rem;color:var(--ink-2);background:none;border:0;border-radius:10px;padding:8px 14px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:.15s;white-space:nowrap}
.tabs button:hover{background:var(--orange-soft);color:var(--orange-deep)}
.tabs button.active{background:var(--ink);color:var(--paper)}
.tabs button b{font-family:'Kanit';font-weight:700}
@media(max-width:860px){
  .phead .bt{font-size:1.05rem}
  .tabs{margin-left:0;width:100%;justify-content:stretch}
  .tabs button{flex:1;justify-content:center;padding:8px 6px;font-size:.82rem}
}

.pgrid{display:grid;grid-template-columns:minmax(0,1fr) 372px;gap:16px;align-items:start}
@media(max-width:980px){.pgrid{grid-template-columns:1fr}}

/* map card */
.chamber{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.chamber-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;padding:14px 18px 2px}
.chamber-head .cn{font-family:'Kanit';font-weight:600;font-size:1.02rem}
.chamber-head .cm{font-size:.78rem;color:var(--muted)}
.phint{display:flex;align-items:center;gap:6px;padding:6px 18px 0;font-size:.72rem;color:var(--muted)}
.phint svg{flex:0 0 auto;color:var(--orange-deep)}

.mapwrap{position:relative;padding:6px 10px 2px}
#bkkmap{width:100%;height:auto;display:block;max-height:70vh;touch-action:pan-y}
.khet{cursor:pointer;stroke:rgba(255,255,255,.7);stroke-width:1;transition:opacity .14s,stroke-width .12s;stroke-linejoin:round}
.khet:hover{stroke:var(--ink);stroke-width:2}
.khet.sel{stroke:var(--ink);stroke-width:2.6}
.khet.dim{opacity:.15}
html[data-theme="dark"] .khet{stroke:rgba(6,14,22,.55)}
.klabel{font-family:'Kanit';font-weight:600;fill:#fff;stroke:rgba(6,18,28,.72);stroke-width:2.4;paint-order:stroke;stroke-linejoin:round;text-anchor:middle;pointer-events:none;opacity:0}
.klabel.show{opacity:1}

/* map overlay badge (governor sweep) */
.mapbadge{position:absolute;left:16px;top:12px;z-index:5;display:flex;align-items:center;gap:10px;
  background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:8px 13px;box-shadow:var(--shadow-lg)}
.mapbadge .mv{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;color:#fff;font-family:'Kanit';font-weight:700;font-size:.86rem;flex:0 0 auto;box-shadow:0 0 0 2px var(--card),0 0 0 3.5px currentColor}
.mapbadge .mt{line-height:1.15}
.mapbadge .mt b{display:block;font-family:'Kanit';font-weight:600;font-size:.86rem;color:var(--ink)}
.mapbadge .mt small{font-size:.66rem;color:var(--muted)}
@media(max-width:560px){.mapbadge{left:12px;top:8px;padding:6px 10px}.mapbadge .mv{width:28px;height:28px;font-size:.75rem}}

.legendwrap{display:flex;flex-wrap:wrap;gap:7px;padding:12px 16px 15px;border-top:1px dashed var(--line)}
.lchip{display:inline-flex;align-items:center;gap:7px;font-family:'Kanit';font-weight:500;font-size:.8rem;color:var(--ink-2);
  background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:5px 12px;cursor:pointer;transition:.13s}
.lchip .sw{width:11px;height:11px;border-radius:3px;flex:0 0 auto}
.lchip b{font-family:'Kanit';font-weight:700;color:var(--ink)}
.lchip:hover{border-color:var(--orange-line);background:var(--orange-soft)}
.lchip.on{border-color:var(--orange-deep);background:var(--orange-soft);box-shadow:0 0 0 2px rgba(143,169,189,.22)}
.lchip.off{opacity:.4}
.chamber-note{padding:0 18px 15px;font-size:.75rem;color:var(--muted);line-height:1.6}

/* tooltip */
.ptip{position:fixed;z-index:90;pointer-events:none;background:var(--ink);color:var(--paper);border-radius:11px;
  padding:8px 12px;font-size:.8rem;box-shadow:var(--shadow-lg);max-width:250px;opacity:0;transform:translateY(4px);transition:opacity .1s}
.ptip.on{opacity:1}
.ptip .tn{font-family:'Kanit';font-weight:600;font-size:.88rem}
.ptip .tp{display:flex;align-items:center;gap:6px;margin-top:3px}
.ptip .tp .sw{width:9px;height:9px;border-radius:2px;flex:0 0 auto}
html[data-theme="dark"] .ptip{background:#0E1C29;border:1px solid var(--line-2);color:var(--ink)}

/* side panel */
.pside{position:sticky;top:84px;display:flex;flex-direction:column;gap:14px}
@media(max-width:980px){.pside{position:static}}
.scard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:15px}
.scard .sb-head{font-family:'Kanit';font-weight:600;font-size:.98rem;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.scard .sb-head svg{color:var(--orange-deep);flex:0 0 auto}
.scard .sb-head .sc{margin-left:auto;font-size:.72rem;font-weight:500;color:var(--muted)}

/* winner hero */
.whero{display:flex;gap:13px;align-items:center;padding:13px;border-radius:15px;color:#fff;margin-bottom:13px;
  box-shadow:var(--shadow)}
.whero .wav{width:56px;height:56px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;background:rgba(255,255,255,.2);
  font-family:'Kanit';font-weight:700;font-size:1.15rem;box-shadow:0 0 0 3px rgba(255,255,255,.35)}
.whero .wi{min-width:0}
.whero .wn{font-family:'Kanit';font-weight:600;font-size:1.12rem;line-height:1.2}
.whero .wmeta{font-size:.78rem;opacity:.92;margin-top:2px}
.whero .wbig{font-family:'Kanit';font-weight:700;font-size:1.35rem;margin-top:5px;font-variant-numeric:tabular-nums}
.whero .wbig span{font-size:.8rem;font-weight:500;opacity:.9}

/* ranking bars */
.rank{display:flex;flex-direction:column;gap:2px;max-height:430px;overflow-y:auto;margin:0 -4px}
.rank::-webkit-scrollbar{width:7px}.rank::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:7px}
.rrow{display:grid;grid-template-columns:26px 1fr auto;gap:9px;align-items:center;padding:7px 5px;border-radius:9px}
.rrow:hover{background:var(--wash)}
.rrow.win{background:var(--orange-soft)}
.rno{font-family:'Kanit';font-weight:600;font-size:.72rem;color:var(--muted);width:26px;height:26px;border-radius:8px;
  display:grid;place-items:center;background:var(--wash);border:1px solid var(--line)}
.rmid{min-width:0}
.rnm{font-weight:600;font-size:.86rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rpt{font-size:.7rem;color:var(--muted);margin-bottom:3px}
.rbar{height:7px;border-radius:5px;background:var(--wash);overflow:hidden}
.rbar i{display:block;height:100%;border-radius:5px}
.rval{text-align:right;flex:0 0 auto}
.rval .rp{font-family:'Kanit';font-weight:700;font-size:.92rem}
.rval .rv{font-size:.68rem;color:var(--muted)}

/* candidate/winner avatars with photo overlay (photo covers number/✓ when available) */
.ava{position:relative;overflow:hidden}
.ava img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 16%}

/* campaign song player (ผู้ว่าฯ tab) */
.songcard{display:flex;align-items:center;gap:11px;padding:10px 12px;border:1px solid var(--line);border-radius:14px;background:var(--wash);margin-bottom:13px}
.songplay{width:40px;height:40px;border-radius:50%;border:0;flex:0 0 auto;cursor:pointer;display:grid;place-items:center;color:#fff;font-size:.9rem;background:linear-gradient(135deg,#00A651,#00783A);box-shadow:var(--shadow);transition:transform .1s}
.songplay:active{transform:scale(.92)}
.songinfo{flex:1 1 auto;min-width:0}
.songttl{font-family:'Kanit';font-weight:600;font-size:.85rem;line-height:1.15;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.songsub{font-size:.66rem;color:var(--muted);margin:1px 0 5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.songbar{height:6px;border-radius:4px;background:var(--line-2);overflow:hidden;cursor:pointer}
.songbar i{display:block;height:100%;width:0;background:#00A651;border-radius:4px;transition:width .2s linear}
.songtime{font-family:'Kanit';font-size:.64rem;color:var(--muted);flex:0 0 auto;min-width:70px;text-align:right;font-variant-numeric:tabular-nums}
.songyt{flex:0 0 auto;font-family:'Kanit';font-weight:700;font-size:.62rem;color:#d00;background:rgba(220,0,0,.08);border:1px solid rgba(220,0,0,.25);border-radius:8px;padding:5px 7px;white-space:nowrap}
.yt-audio-dock{position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none}
.songwrap{margin-bottom:13px}
.songhead{font-family:'Kanit';font-weight:600;font-size:.8rem;color:var(--ink-2);margin-bottom:8px;display:flex;align-items:center;gap:7px}
.songhead svg{color:var(--orange-deep);flex:0 0 auto}
.songlist{display:flex;flex-direction:column;gap:8px}
.songlist .songcard{margin-bottom:0}

/* party seat totals */
.ptot{display:flex;flex-direction:column;gap:11px}
.ptrow .pth{display:flex;align-items:center;gap:8px;font-size:.86rem;margin-bottom:4px}
.ptrow .pth .sw{width:12px;height:12px;border-radius:4px;flex:0 0 auto}
.ptrow .pth .pnm{font-family:'Kanit';font-weight:600;flex:1 1 auto;min-width:0}
.ptrow .pth .pseat{font-family:'Kanit';font-weight:700;font-size:1rem}
.ptrow .pth .pseat span{font-size:.72rem;font-weight:500;color:var(--muted)}
.ptrow .ptbar{height:9px;border-radius:6px;background:var(--wash);overflow:hidden}
.ptrow .ptbar i{display:block;height:100%;border-radius:6px}
.ptrow .ptv{font-size:.68rem;color:var(--muted);margin-top:3px}

/* stats strip */
.sstrip{display:flex;flex-wrap:wrap;gap:9px;margin-top:13px;padding-top:13px;border-top:1px dashed var(--line)}
.sfig{flex:1 1 92px;background:var(--wash);border:1px solid var(--line);border-radius:12px;padding:9px 11px}
.sfig .sfk{font-size:.68rem;color:var(--muted);line-height:1.3}
.sfig .sfv{font-family:'Kanit';font-weight:700;font-size:1.05rem;font-variant-numeric:tabular-nums}
.sfig .sfv small{font-size:.7rem;font-weight:500;color:var(--muted)}

/* district detail */
.dback{display:inline-flex;align-items:center;gap:7px;font-family:'Kanit';font-weight:500;font-size:.84rem;color:var(--orange-deep);
  background:var(--orange-soft);border:1px solid var(--orange-line);border-radius:10px;padding:7px 13px;margin-bottom:12px;cursor:pointer}
.ddet .ddn{font-family:'Kanit';font-weight:600;font-size:1.5rem;line-height:1.1}
.ddet .ddwin{display:flex;align-items:center;gap:9px;margin-top:12px;padding:12px;border-radius:14px;color:#fff;box-shadow:var(--shadow)}
.ddet .ddwin .dva{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.2);display:grid;place-items:center;
  font-family:'Kanit';font-weight:700;flex:0 0 auto;box-shadow:0 0 0 2px rgba(255,255,255,.32)}
.ddet .ddwin .dvn{font-family:'Kanit';font-weight:600;font-size:1.02rem;line-height:1.2}
.ddet .ddwin .dvm{font-size:.76rem;opacity:.92;margin-top:2px}
.ddrows{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.ddr{display:flex;justify-content:space-between;align-items:center;font-size:.86rem;padding:6px 2px;border-bottom:1px dashed var(--line)}
.ddr b{font-family:'Kanit';font-weight:600}
.dempty{color:var(--muted);font-size:.85rem;line-height:1.7;padding:6px 2px}

/* ===== SUMMARY VIEW ===== */
#sumView{display:none}
.sumgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
@media(max-width:820px){.sumgrid{grid-template-columns:1fr}}
.sumcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
.sumcard h3{font-family:'Kanit';font-weight:600;font-size:1.05rem;display:flex;align-items:center;gap:9px;margin-bottom:4px}
.sumcard h3 svg{color:var(--orange-deep);flex:0 0 auto}
.sumcard .sub{font-size:.8rem;color:var(--muted);margin-bottom:14px}
.sumwin{display:flex;align-items:center;gap:13px;padding:14px;border-radius:15px;color:#fff;margin-bottom:14px}
.sumwin .swa{width:58px;height:58px;border-radius:50%;background:rgba(255,255,255,.2);display:grid;place-items:center;
  font-family:'Kanit';font-weight:700;font-size:1.2rem;flex:0 0 auto;box-shadow:0 0 0 3px rgba(255,255,255,.35)}
.sumwin .swn{font-family:'Kanit';font-weight:600;font-size:1.2rem;line-height:1.15}
.sumwin .swm{font-size:.8rem;opacity:.92;margin-top:2px}
.sumwin .swb{font-family:'Kanit';font-weight:700;font-size:1.5rem;margin-top:4px}
.sumwin .swb span{font-size:.82rem;font-weight:500;opacity:.9}
/* seat composition bar + dot grid */
.seatbar{display:flex;height:26px;border-radius:8px;overflow:hidden;margin:4px 0 14px;box-shadow:var(--shadow)}
.seatbar i{height:100%}
.dotgrid{display:grid;grid-template-columns:repeat(10,1fr);gap:8px;margin:6px 0 4px}
.dotgrid .dot{aspect-ratio:1;border-radius:50%;box-shadow:0 0 0 1px rgba(0,0,0,.05) inset}
.dotgrid .dot.ava{cursor:pointer;overflow:visible;display:block;text-decoration:none;transition:transform .13s ease}
.dotgrid .dot.ava img{object-position:50% 12%;border-radius:50%}
.dotgrid .dot.ava:hover{transform:translateY(-2px) scale(1.14);z-index:6}
.dotgrid .dot.ava:focus-visible{transform:translateY(-2px) scale(1.14);z-index:6;outline:3px solid var(--orange-deep);outline-offset:2px}
.dotgrid .dot .dtip{position:absolute;left:50%;bottom:calc(100% + 8px);transform:translate(-50%,4px) scale(.96);transform-origin:bottom center;background:#12161d;color:#fff;border-radius:10px;padding:6px 11px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .13s ease,transform .13s ease;z-index:20;box-shadow:0 8px 22px rgba(0,0,0,.32)}
.dotgrid .dot .dtip b{display:block;font-family:'Kanit';font-weight:600;font-size:.82rem}
.dotgrid .dot .dtip small{display:block;font-size:.68rem;opacity:.72;margin-top:1px;font-weight:400}
.dotgrid .dot .dtip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#12161d}
.dotgrid .dot:hover .dtip,.dotgrid .dot:focus-visible .dtip{opacity:1;transform:translate(-50%,0) scale(1)}
/* ส.ก. profile card (modal) */
.skcard-ov{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(8,11,16,.58);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .18s ease}
.skcard-ov.on{opacity:1;pointer-events:auto}
.skcard{position:relative;width:min(400px,100%);max-height:92vh;overflow-y:auto;background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:0 24px 60px rgba(0,0,0,.42);transform:translateY(14px) scale(.97);transition:transform .2s ease}
.skcard-ov.on .skcard{transform:none}
.skcard-x{position:absolute;top:11px;right:11px;z-index:2;width:32px;height:32px;border:0;border-radius:50%;cursor:pointer;background:rgba(255,255,255,.24);color:#fff;font-size:.95rem;line-height:1;display:grid;place-items:center;transition:background .15s}
.skcard-x:hover{background:rgba(255,255,255,.42)}
.skcard-hero{height:94px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;justify-content:center;border-radius:20px 20px 0 0}
.skcard-photo{position:relative;overflow:hidden;width:112px;height:112px;border-radius:50%;margin-top:38px;border:4px solid var(--card);background:var(--wash);box-shadow:0 6px 18px rgba(0,0,0,.28);flex:0 0 auto;display:grid;place-items:center;font-family:'Kanit';font-weight:600;font-size:2.4rem;color:var(--muted)}
.skcard-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 14%}
.skcard-body{padding:60px 22px 22px;text-align:center}
.skcard-party{display:inline-block;padding:4px 13px;border-radius:999px;color:#fff;font-size:.75rem;font-weight:600;font-family:'Kanit';margin-bottom:9px}
.skcard-body h3{font-family:'Kanit';font-weight:600;font-size:1.34rem;line-height:1.2;margin:0 0 4px;color:var(--ink)}
.skcard-role{font-size:.81rem;color:var(--muted);margin-bottom:16px}
.skcard-stats{display:flex;gap:9px;margin-bottom:15px}
.skcard-stats>div{flex:1;background:var(--wash);border:1px solid var(--line);border-radius:14px;padding:11px 5px}
.skcard-stats b{display:block;font-family:'Kanit';font-weight:700;font-size:1.12rem;color:var(--ink)}
.skcard-stats span{display:block;font-size:.67rem;color:var(--muted);margin-top:3px;line-height:1.2}
.skcard-note{font-size:.75rem;color:var(--ink-2);line-height:1.55;background:var(--wash);border:1px dashed var(--line);border-radius:12px;padding:10px 12px;margin:0 0 15px;text-align:left}
.skcard-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:13px;text-decoration:none;font-family:'Kanit';font-weight:600;font-size:.9rem;color:#fff;background:linear-gradient(135deg,var(--acc),var(--acc2));box-shadow:var(--shadow);transition:transform .12s ease,filter .12s ease}
.skcard-btn:hover{transform:translateY(-1px);filter:brightness(1.06)}
@media(max-width:480px){.skcard-stats{flex-wrap:wrap}.skcard-stats>div{min-width:calc(33% - 6px)}}
/* สภา กทม. — hemicycle + roster */
.council-wrap{display:flex;flex-direction:column;gap:16px}
.hemi-wrap{padding:8px 14px 2px}
.hemi-wrap svg{width:100%;height:auto;display:block}
.cseat{cursor:pointer;stroke:rgba(8,22,34,.22);stroke-width:.7;transition:transform .13s ease,opacity .15s;transform-box:fill-box;transform-origin:center}
.cseat:hover{stroke:var(--ink);stroke-width:1.5;transform:scale(1.5)}
html[data-theme="dark"] .cseat{stroke:rgba(0,0,0,.4)}
.hemi-bg{pointer-events:none}
.cbody{padding:10px 18px 18px}
.cbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px}
#rsearch{flex:1;min-width:190px;padding:10px 13px;border:1px solid var(--line);border-radius:12px;background:var(--wash);color:var(--ink);font-family:inherit;font-size:.9rem}
#rsearch:focus{outline:none;border-color:var(--orange-deep);box-shadow:0 0 0 3px var(--orange-soft)}
.cfilters{display:flex;flex-wrap:wrap;gap:6px}
.cfilter{cursor:pointer;border:1px solid var(--line);background:var(--card);border-radius:999px;padding:6px 12px;font-family:inherit;font-size:.78rem;color:var(--ink-2);display:inline-flex;align-items:center;gap:6px;transition:border-color .12s,background .12s,color .12s}
.cfilter .sw{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
.cfilter:hover{border-color:var(--orange-line)}
.cfilter.on{background:var(--ink);color:var(--card);border-color:var(--ink)}
.roster-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(max-width:640px){.roster-grid{grid-template-columns:1fr}}
.ritem{display:flex;align-items:center;gap:11px;padding:9px 11px;border:1px solid var(--line);border-radius:14px;background:var(--card);text-decoration:none;color:inherit;transition:border-color .12s,transform .12s,box-shadow .12s}
.ritem:hover{border-color:var(--muted);transform:translateY(-1px);box-shadow:var(--shadow)}
.ritem:focus-visible{outline:2px solid var(--orange-deep);outline-offset:2px}
.rav{width:44px;height:44px;border-radius:50%;flex:0 0 auto;background:var(--wash);display:grid;place-items:center;font-family:'Kanit';font-weight:600;font-size:1.05rem;color:var(--muted);position:relative;overflow:hidden}
.rav img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 14%}
.rinfo{flex:1;min-width:0}
.rname{display:block;font-family:'Kanit';font-weight:600;font-size:.92rem;color:var(--ink);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rmeta{display:flex;align-items:center;gap:6px;font-size:.73rem;color:var(--muted);margin-top:2px;min-width:0}
.rmeta .pdot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
.rmeta .rmt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rvotes{text-align:right;font-family:'Kanit';font-weight:700;font-size:.88rem;color:var(--ink);flex:0 0 auto;line-height:1.1}
.rvotes small{display:block;font-family:inherit;font-weight:400;font-size:.63rem;color:var(--muted);margin-top:1px}
.ccount{font-size:.8rem;color:var(--muted);margin-top:13px;text-align:center}
.leaders{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:560px){.leaders{grid-template-columns:1fr}}
.leader{display:flex;flex-direction:column;align-items:center;text-align:center;gap:7px;padding:16px 12px;border:1px solid var(--line);border-radius:16px;background:var(--card);text-decoration:none;color:inherit;transition:transform .12s,box-shadow .12s,border-color .12s}
.leader:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--muted)}
.leader:focus-visible{outline:2px solid var(--orange-deep);outline-offset:2px}
.leader.lead-chair{border:2px solid var(--acc);background:var(--wash)}
.lrole{font-family:'Kanit';font-weight:600;font-size:.73rem;color:var(--muted)}
.lead-chair .lrole{color:var(--acc)}
.lav{width:74px;height:74px;border-radius:50%;background:var(--wash);position:relative;overflow:hidden;display:grid;place-items:center;font-family:'Kanit';font-weight:600;font-size:1.6rem;color:var(--muted);box-shadow:0 0 0 3px var(--card),0 0 0 5px var(--lc,transparent)}
.lav img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 14%}
.lname{font-family:'Kanit';font-weight:600;font-size:1rem;color:var(--ink);line-height:1.2}
.lead-chair .lname{font-size:1.08rem}
.lparty{display:inline-block;font-size:.72rem;color:#fff;padding:3px 11px;border-radius:999px}
.lnote{font-size:.75rem;color:var(--muted);margin:14px 0 0;text-align:center;line-height:1.55}
.sumfacts{margin:4px 0 0;padding:0;list-style:none;display:flex;flex-direction:column;gap:10px}
.sumfacts li{display:flex;gap:10px;font-size:.86rem;color:var(--ink-2);line-height:1.55}
.sumfacts li svg{flex:0 0 auto;margin-top:2px;color:var(--orange-deep)}
.sumfacts b{color:var(--ink);font-weight:600}
.tcompare{display:flex;gap:12px;margin-top:6px}
.tcompare .tc{flex:1;background:var(--wash);border:1px solid var(--line);border-radius:14px;padding:13px;text-align:center}
.tcompare .tc .tk{font-size:.74rem;color:var(--muted)}
.tcompare .tc .tv{font-family:'Kanit';font-weight:700;font-size:1.6rem;line-height:1.1;margin:2px 0}
.tcompare .tc .ts{font-size:.68rem;color:var(--muted)}

.pfoot{margin-top:22px;font-size:.72rem;color:var(--muted);line-height:1.7;border-top:1px solid var(--line);padding-top:12px}
.pfoot a{color:var(--orange-deep);text-decoration:underline}

<script>
'use strict';
(function(){
const GEO=window.BKKGEO, D=window.BKKDATA, SK=D.sk, GOV=D.gov;
const NS='http://www.w3.org/2000/svg';
const fmt=n=>n==null?'—':Number(n).toLocaleString('en-US');
const el=id=>document.getElementById(id);
const state={view:'gov', focus:null, sel:null};

// governor candidate accent color
function govColor(c){
  if(c.no===9) return GOV.winnerColor;
  const m={'ประชาชน':'#FF6A13','ประชาธิปัตย์':'#27AAE1','เพื่อไทย':'#ED1C24','เศรษฐกิจ':'#B7791F'};
  return m[c.party]||'#9AA3AE';
}
const skColor=name=>{const d=SK.districts[name]; return d?(SK.colors[d.party]||'#9AA3AE'):'#C9D4DC';};

/* ---------- photos (avatar shows portrait if available, else number/✓) ---------- */
const PH=window.BKKPHOTOS||{gov:{},sk:{}};
function govAvatar(c,cls){
  const f=PH.gov&&PH.gov[c.no];
  return `<div class="${cls} ava">${c.no}${f?`<img src="bkk-photos/${f}" alt="" loading="lazy" decoding="async" onerror="this.remove()">`:''}</div>`;
}

/* ---------- campaign songs (YouTube official audio) — 2-track playlist ---------- */
const SONGS=[
  {id:'sQUu4_yDrAI',title:'ชัช-ชัช-ชาติ เอ้า! กา เบอร์ 9',sub:'ทีมชัชชาติ · กรุงเทพฯ ทำงาน · official audio'},
  {id:'NVJip0Tsub4',title:'เพลงในพลังของท่านชัชชาติ',sub:'เพลงให้กำลังใจท่านชัชชาติ'}
];
const SONG={player:null,ready:false,apiLoading:false,cur:-1,playing:false,timer:null,_pending:null,errIdx:-1};
function fmtTime(s){s=Math.max(0,Math.floor(s||0));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function songUI(){SONGS.forEach((s,i)=>{const b=el('songBtn'+i);if(!b)return;b.innerHTML=(SONG.cur===i&&SONG.playing)?'❚❚':'▶';});}
function songTimer(on){clearInterval(SONG.timer);SONG.timer=null;if(!on)return;
  SONG.timer=setInterval(()=>{if(!SONG.player||SONG.cur<0||!SONG.player.getDuration)return;
    const d=SONG.player.getDuration()||0,t=SONG.player.getCurrentTime()||0,p=el('songProg'+SONG.cur),tm=el('songTime'+SONG.cur);
    if(p&&d)p.style.width=(t/d*100).toFixed(1)+'%'; if(tm)tm.textContent=fmtTime(t)+' / '+fmtTime(d);
  },250);}
function songCreate(){if(SONG.player)return;
  SONG.player=new YT.Player('ytdock',{height:'120',width:'120',playerVars:{playsinline:1},
    events:{onReady:()=>{SONG.ready=true;if(SONG._pending){const c=SONG._pending;SONG._pending=null;c();}},
      onStateChange:e=>{if(e.data===1){SONG.playing=true;songUI();songTimer(true);}
        else if(e.data===2||e.data===0){SONG.playing=false;songUI();songTimer(false);
          if(e.data===0){const p=el('songProg'+SONG.cur);if(p)p.style.width='0%';}}},
      onError:()=>{SONG.playing=false;songTimer(false);SONG.errIdx=SONG.cur;songUI();
        const tm=el('songTime'+SONG.cur);if(tm)tm.textContent='เล่นไม่ได้ · กด YT';}}});}
function songEnsure(cb){if(SONG.player&&SONG.ready){cb();return;}SONG._pending=cb;
  if(window.YT&&window.YT.Player){songCreate();return;}
  if(!SONG.apiLoading){SONG.apiLoading=true;window.onYouTubeIframeAPIReady=songCreate;
    const s=document.createElement('script');s.src='https://www.youtube.com/iframe_api';document.head.appendChild(s);}}
function songPlay(i){
  if(SONG.errIdx===i){window.open('https://youtu.be/'+SONGS[i].id,'_blank');return;}
  if(window.__mdStop)window.__mdStop();
  window.__mdStop=()=>{if(SONG.player&&SONG.playing)SONG.player.pauseVideo();};
  songEnsure(()=>{
    if(SONG.cur===i){ if(SONG.playing)SONG.player.pauseVideo(); else SONG.player.playVideo(); }
    else { const op=el('songProg'+SONG.cur); if(op)op.style.width='0%'; SONG.cur=i; SONG.errIdx=-1; SONG.player.loadVideoById(SONGS[i].id); }
    songUI();
  });}
function songSeek(i,ev){if(SONG.cur!==i||!SONG.player||!SONG.player.getDuration)return;
  const bar=el('songBar'+i);if(!bar)return;const r=bar.getBoundingClientRect();
  const f=Math.min(1,Math.max(0,(ev.clientX-r.left)/r.width));
  SONG.player.seekTo(f*(SONG.player.getDuration()||0),true);}
function songListHTML(){return `<div class="songwrap"><div class="songhead"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>เพลงหาเสียง · ชัชชาติ เบอร์ 9</div><div class="songlist">`+
  SONGS.map((s,i)=>`<div class="songcard">`+
    `<button class="songplay" id="songBtn${i}" title="เล่น/หยุดเพลง">▶</button>`+
    `<div class="songinfo"><div class="songttl">${s.title}</div>`+
    `<div class="songsub">${s.sub}</div>`+
    `<div class="songbar" id="songBar${i}"><i id="songProg${i}"></i></div></div>`+
    `<div class="songtime" id="songTime${i}">0:00</div>`+
    `<a class="songyt" href="https://youtu.be/${s.id}" target="_blank" rel="noopener" title="เปิดใน YouTube">YT ▶</a></div>`
  ).join('')+`</div></div>`;}
function bindSong(){SONGS.forEach((s,i)=>{const b=el('songBtn'+i);if(b)b.onclick=()=>songPlay(i);
  const bar=el('songBar'+i);if(bar)bar.onclick=e=>songSeek(i,e);});songUI();if(SONG.playing)songTimer(true);}

/* ---------- build map once ---------- */
const svg=el('bkkmap'), kg=el('khetG'), lg=el('labelG');
svg.setAttribute('viewBox', GEO.meta.viewBox);
const paths={};
Object.entries(GEO.districts).forEach(([name,g])=>{
  const p=document.createElementNS(NS,'path');
  p.setAttribute('d', g.d);
  p.setAttribute('class','khet');
  p.dataset.name=name;
  kg.appendChild(p);
  paths[name]=p;
  p.addEventListener('mouseenter',e=>onEnter(name,e));
  p.addEventListener('mousemove',moveTip);
  p.addEventListener('mouseleave',onLeave);
  p.addEventListener('click',()=>onClick(name));
});
// data-coverage guard
Object.keys(GEO.districts).forEach(n=>{ if(state && !SK.districts[n]) console.warn('no ส.ก. data for',n); });

/* ---------- tooltip ---------- */
const tip=el('ptip');
function tipHTML(name){
  if(state.view==='gov'){
    return `<div class="tn">เขต${name}</div><div class="tp"><span class="sw" style="background:${GOV.winnerColor}"></span>ผู้ชนะ: ชัชชาติ สิทธิพันธุ์</div>`;
  }
  const d=SK.districts[name];
  if(!d) return `<div class="tn">เขต${name}</div>`;
  return `<div class="tn">เขต${name}</div>`+
    `<div class="tp"><span class="sw" style="background:${skColor(name)}"></span>${d.winner||'—'} · ${d.grp||d.party}</div>`+
    (d.votes?`<div class="tp" style="opacity:.85">${fmt(d.votes)} คะแนน (${d.pct}%)</div>`:'');
}
function onEnter(name,e){ if(paths[name].classList.contains('dim'))return; tip.innerHTML=tipHTML(name); tip.classList.add('on'); moveTip(e); }
function moveTip(e){ const pad=14, w=tip.offsetWidth, h=tip.offsetHeight;
  let x=e.clientX+pad, y=e.clientY+pad;
  if(x+w>innerWidth-8) x=e.clientX-w-pad; if(y+h>innerHeight-8) y=e.clientY-h-pad;
  tip.style.left=x+'px'; tip.style.top=y+'px'; }
function onLeave(){ tip.classList.remove('on'); }
function onClick(name){
  if(state.view==='sk'){ state.sel=name; renderPanel(); recolor(); }
  else { // gov: flash
    const p=paths[name]; p.classList.add('sel'); setTimeout(()=>p.classList.remove('sel'),600);
  }
}

/* ---------- recolor ---------- */
function recolor(){
  Object.entries(paths).forEach(([name,p])=>{
    p.setAttribute('fill', state.view==='gov'?GOV.winnerColor:skColor(name));
    p.classList.remove('dim','sel');
    if(state.view==='sk'){
      if(state.focus){ const d=SK.districts[name]; if(!d||d.party!==state.focus) p.classList.add('dim'); }
      if(state.sel===name) p.classList.add('sel');
    }
  });
}
window.bkkRecolor=recolor;

/* ---------- legend ---------- */
function renderLegend(){
  const box=el('legend');
  if(state.view==='gov'){
    box.innerHTML=`<span class="lchip" style="cursor:default"><span class="sw" style="background:${GOV.winnerColor}"></span>ชัชชาติ สิทธิพันธุ์ <b>ชนะทั้ง 50 เขต</b></span>`+
      `<span class="lchip" style="cursor:default;opacity:.75"><span class="sw" style="background:var(--wash);border:1px solid var(--line-2)"></span>ไม่มีผลแยกรายเขต (นับรวมทั้ง กทม.)</span>`;
    return;
  }
  box.innerHTML=SK.parties.map(pt=>
    `<span class="lchip${state.focus&&state.focus!==pt.key?' off':''}${state.focus===pt.key?' on':''}" data-k="${pt.key}">`+
    `<span class="sw" style="background:${pt.color}"></span>${pt.key} <b>${pt.seats}</b></span>`).join('');
  box.querySelectorAll('.lchip').forEach(c=>c.onclick=()=>{
    const k=c.dataset.k; state.focus=(state.focus===k)?null:k; renderLegend(); recolor();
  });
}

/* ---------- panel ---------- */
function statStrip(s){
  return `<div class="sstrip">`+
    `<div class="sfig"><div class="sfk">ผู้มีสิทธิ</div><div class="sfv">${fmt(s.eligible)}</div></div>`+
    `<div class="sfig"><div class="sfk">มาใช้สิทธิ</div><div class="sfv">${s.turnoutPct}<small>%</small></div></div>`+
    `<div class="sfig"><div class="sfk">บัตรดี</div><div class="sfv">${fmt(s.valid)}</div></div>`+
    `<div class="sfig"><div class="sfk">บัตรเสีย</div><div class="sfv">${fmt(s.invalid)}</div></div>`+
    `<div class="sfig"><div class="sfk">ไม่ประสงค์</div><div class="sfv">${fmt(s.abstain)}</div></div>`+
  `</div>`;
}
function renderPanel(){
  const panel=el('panel');
  if(state.view==='gov'){
    const w=GOV.candidates[0], max=w.pct;
    const rows=GOV.candidates.map(c=>{
      const col=govColor(c), wd=Math.max(2,(c.pct/max*100)).toFixed(1);
      return `<div class="rrow${c.no===9?' win':''}">${govAvatar(c,'rno')}`+
        `<div class="rmid"><div class="rnm">${c.name}</div><div class="rpt">${c.party}</div>`+
        `<div class="rbar"><i style="width:${wd}%;background:${col}"></i></div></div>`+
        `<div class="rval"><div class="rp" style="color:${col}">${c.pct}%</div><div class="rv">${fmt(c.votes)}</div></div></div>`;
    }).join('');
    panel.innerHTML=`<div class="sb-head"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>ผลผู้ว่าฯ กทม. <span class="sc">ผู้สมัคร ${GOV.candidates.length} คน</span></div>`+
      `<div class="whero" style="background:linear-gradient(135deg,${GOV.winnerColor},${shade(GOV.winnerColor)})">${govAvatar(w,'wav')}`+
      `<div class="wi"><div class="wn">${w.name}</div><div class="wmeta">${w.party} · เบอร์ ${w.no}</div>`+
      `<div class="wbig">${fmt(w.votes)} <span>คะแนน · ${w.pct}%</span></div></div></div>`+
      songListHTML()+
      `<div class="rank">${rows}</div>`+statStrip(GOV.stats);
    bindSong();
    return;
  }
  // sk
  if(state.sel){
    const name=state.sel, d=SK.districts[name], col=skColor(name);
    panel.innerHTML=`<button class="dback" onclick="bkkClearSel()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>กลับทุกเขต</button>`+
      `<div class="ddet"><div class="ddn">เขต${name}</div>`+
      `<div class="ddwin" style="background:linear-gradient(135deg,${col},${shade(col)})"><div class="dva ava">${(PH.sk&&PH.sk[name])?`<img src="bkk-photos/${PH.sk[name]}" alt="" loading="lazy" decoding="async" onerror="this.remove()">`:'✓'}</div>`+
      `<div><div class="dvn">${d.winner||'—'}</div><div class="dvm">${d.grp||d.party}</div></div></div>`+
      `<div class="ddrows">`+
      `<div class="ddr"><span>คะแนนที่ได้</span><b>${fmt(d.votes)}</b></div>`+
      `<div class="ddr"><span>ร้อยละของเขต</span><b>${d.pct!=null?d.pct+'%':'—'}</b></div>`+
      `<div class="ddr"><span>สังกัด</span><b>${d.grp||d.party}</b></div>`+
      `</div></div>`;
    return;
  }
  const maxSeat=Math.max(...SK.parties.map(p=>p.seats));
  const rows=SK.parties.map(pt=>
    `<div class="ptrow"><div class="pth"><span class="sw" style="background:${pt.color}"></span>`+
    `<span class="pnm">${pt.key}</span><span class="pseat">${pt.seats}<span> ที่นั่ง</span></span></div>`+
    `<div class="ptbar"><i style="width:${(pt.seats/maxSeat*100).toFixed(1)}%;background:${pt.color}"></i></div>`+
    (pt.votes?`<div class="ptv">${fmt(pt.votes)} คะแนน</div>`:'')+`</div>`).join('');
  panel.innerHTML=`<div class="sb-head"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18M5 21V10l7-5 7 5v11"/></svg>ที่นั่ง ส.ก. รายพรรค <span class="sc">รวม 50 เขต</span></div>`+
    `<div class="ptot">${rows}</div>`+statStrip(SK.stats)+
    `<div style="font-size:.74rem;color:var(--muted);margin-top:12px;line-height:1.6">แตะแผนที่หรือชิปพรรคด้านล่างแผนที่เพื่อเจาะรายเขต</div>`;
}

function shade(hex){ // darken ~18%
  const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.round(r*.72);g=Math.round(g*.72);b=Math.round(b*.72);
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

/* ---------- สภา กทม. (hemicycle + roster) ---------- */
function renderCouncil(){
  var members=Object.keys(SK.districts).map(function(dist){
    var d=SK.districts[dist];
    return {dist:dist,party:d.party,grp:d.grp,winner:d.winner,votes:d.votes,pct:d.pct,
            color:(SK.colors[d.party]||'#8A94A6'),photo:(PH.sk&&PH.sk[dist])||null};
  });
  var oidx=function(p){var i=SK.order.indexOf(p);return i<0?99:i;};
  members.sort(function(a,b){return (oidx(a.party)-oidx(b.party))||(b.votes-a.votes);});

  // hemicycle geometry (parliament-style ~230° fan, บัลลังก์เว้นช่องล่าง)
  var CX=340,CY=270,R0=112,R1=240,ROWS=5,SEATR=9;
  var A0=205*Math.PI/180, A1=-25*Math.PI/180;
  var radii=[]; for(var ri=0;ri<ROWS;ri++) radii.push(R0+ri*(R1-R0)/(ROWS-1));
  var rsum=radii.reduce(function(a,b){return a+b;},0);
  var targets=radii.map(function(r){return 50*r/rsum;});
  var counts=targets.map(Math.floor);
  var rem=50-counts.reduce(function(a,b){return a+b;},0);
  targets.map(function(t,i){return {i:i,f:t-Math.floor(t)};}).sort(function(a,b){return b.f-a.f;})
         .slice(0,rem).forEach(function(o){counts[o.i]++;});
  var seats=[];
  counts.forEach(function(n,row){
    var r=radii[row];
    for(var j=0;j<n;j++){
      var th=A0-(j+0.5)*(A0-A1)/n;
      seats.push({x:CX+r*Math.cos(th),y:CY-r*Math.sin(th),th:th});
    }
  });
  seats.sort(function(p,q){return q.th-p.th;});   // ซ้าย→ขวา เกิดลิ่มพรรคตามแนวรัศมี
  // ── ที่นั่ง 3 มิติ: radial-gradient ต่อสีพรรค ──
  function hx2rgb(h){h=h.replace('#','');if(h.length===3)h=h.replace(/(.)/g,'$1$1');return [parseInt(h.substr(0,2),16),parseInt(h.substr(2,2),16),parseInt(h.substr(4,2),16)];}
  function rgb2hx(a){return '#'+a.map(function(v){v=Math.max(0,Math.min(255,Math.round(v)));return ('0'+v.toString(16)).slice(-2);}).join('');}
  function mix(hex,t,amt){var c=hx2rgb(hex);return rgb2hx([c[0]+(t[0]-c[0])*amt,c[1]+(t[1]-c[1])*amt,c[2]+(t[2]-c[2])*amt]);}
  var gid=function(c){return 'skg'+c.replace(/[^0-9A-Za-z]/g,'');};
  var gradDefs=SK.parties.map(function(p){var c=p.color;
    return '<radialGradient id="'+gid(c)+'" cx="33%" cy="28%" r="80%">'
      +'<stop offset="0" stop-color="'+mix(c,[255,255,255],.48)+'"/>'
      +'<stop offset="0.55" stop-color="'+c+'"/>'
      +'<stop offset="1" stop-color="'+mix(c,[0,0,0],.26)+'"/></radialGradient>';
  }).join('')
    +'<radialGradient id="skHallWash" cx="50%" cy="56%" r="62%"><stop offset="0" stop-color="rgba(201,168,76,.10)"/><stop offset=".55" stop-color="rgba(201,168,76,.045)"/><stop offset="1" stop-color="rgba(201,168,76,0)"/></radialGradient>';
  // ── ฉากหลังห้องประชุม (แสงนวลทอง + แนวแถว + กำแพงโค้งทอง) ──
  var arcD=function(r){var x0=CX+r*Math.cos(A0),y0=CY-r*Math.sin(A0),x1=CX+r*Math.cos(A1),y1=CY-r*Math.sin(A1);return 'M '+x0.toFixed(1)+' '+y0.toFixed(1)+' A '+r+' '+r+' 0 1 1 '+x1.toFixed(1)+' '+y1.toFixed(1);};
  var backdrop='<circle cx="'+CX+'" cy="'+CY+'" r="'+(R1+26)+'" fill="url(#skHallWash)"/>'
    +radii.map(function(r){return '<path d="'+arcD(r)+'" fill="none" stroke="var(--line)" stroke-width="1" stroke-dasharray="2 6" opacity=".55"/>';}).join('')
    +'<path d="'+arcD(R1+13)+'" fill="none" stroke="var(--line)" stroke-width="1.4" opacity=".9"/>'
    +'<path d="'+arcD(R1+19)+'" fill="none" stroke="#C9A84C" stroke-width="1" opacity=".5"/>'
    +'<path d="'+arcD(R0-14)+'" fill="none" stroke="var(--line)" stroke-width="1" stroke-dasharray="1 5" opacity=".75"/>';
  var seatSVG=seats.map(function(s,i){
    var m=members[i]; if(!m)return '';
    return '<circle class="cseat" data-dist="'+m.dist+'" cx="'+s.x.toFixed(1)+'" cy="'+s.y.toFixed(1)+'" r="'+SEATR+'" fill="url(#'+gid(m.color)+')"><title>'+m.winner+' — '+(m.grp||m.party)+' · เขต'+m.dist+'</title></circle>';
  }).join('');
  var hemiSVG='<svg viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="แผนผังที่นั่งสภากรุงเทพมหานคร 50 ที่นั่ง ระบายสีตามพรรค"><defs>'+gradDefs+'</defs><g class="hemi-bg">'+backdrop+'</g><g class="hemi-seats">'+seatSVG+'</g></svg>';
  var hlegend=SK.parties.map(function(p){
    return '<span class="lchip" style="cursor:default"><span class="sw" style="background:'+p.color+'"></span>'+p.key+' <b>'+p.seats+'</b></span>';
  }).join('');

  // roster + party filter chips
  var chips='<button class="cfilter on" data-k="">ทั้งหมด <b>50</b></button>'+SK.parties.map(function(p){
    return '<button class="cfilter" data-k="'+p.key+'"><span class="sw" style="background:'+p.color+'"></span>'+p.key+' '+p.seats+'</button>';
  }).join('');
  var roster=members.map(function(m){
    var q=encodeURIComponent(m.winner?(m.winner+' สมาชิกสภากรุงเทพมหานคร เขต'+m.dist):('ส.ก. เขต'+m.dist+' กรุงเทพมหานคร 2569'));
    var av=m.photo?('<img src="bkk-photos/'+m.photo+'" alt="" decoding="async" onerror="this.remove()">'):((m.winner||'?').trim().charAt(0)||'?');
    var srch=((m.winner||'')+' '+m.dist+' '+(m.grp||m.party)).toLowerCase().replace(/"/g,'');
    return '<a class="ritem" data-dist="'+m.dist+'" data-party="'+m.party+'" data-search="'+srch+'" '
      +'href="https://www.google.com/search?q='+q+'" target="_blank" rel="noopener noreferrer" aria-label="'+(m.winner||'')+' — เขต'+m.dist+' · กดดูการ์ดประวัติ">'
      +'<span class="rav ava">'+av+'</span>'
      +'<span class="rinfo"><span class="rname">'+(m.winner||'—')+'</span>'
        +'<span class="rmeta"><i class="pdot" style="background:'+m.color+'"></i><span class="rmt">'+(m.grp||m.party)+' · เขต'+m.dist+'</span></span></span>'
      +'<span class="rvotes">'+fmt(m.votes)+'<small>คะแนน</small></span></a>';
  }).join('');

  // council leadership (ประธาน + รองประธาน 1-2) — REAL from Wikipedia/news, all in our roster
  var LEADERS=[
    {role:'ประธานสภากรุงเทพมหานคร',dist:'บางซื่อ',chair:true},
    {role:'รองประธานสภาฯ คนที่หนึ่ง',dist:'บึงกุ่ม'},
    {role:'รองประธานสภาฯ คนที่สอง',dist:'บางเขน'}
  ];
  var leadersHTML=LEADERS.map(function(L){
    var d=SK.districts[L.dist]; if(!d)return '';
    var color=(SK.colors[d.party]||'#8A94A6'), f=PH.sk&&PH.sk[L.dist];
    var av=f?('<img src="bkk-photos/'+f+'" alt="" decoding="async" onerror="this.remove()">'):((d.winner||'?').trim().charAt(0)||'?');
    var q=encodeURIComponent((d.winner||'')+' สมาชิกสภากรุงเทพมหานคร เขต'+L.dist);
    return '<a class="leader'+(L.chair?' lead-chair':'')+'" data-dist="'+L.dist+'" data-party="'+d.party+'" '
      +'href="https://www.google.com/search?q='+q+'" target="_blank" rel="noopener noreferrer" '
      +'style="--lc:'+color+(L.chair?';--acc:'+color:'')+'" aria-label="'+L.role+' '+(d.winner||'')+' เขต'+L.dist+' · กดดูการ์ดประวัติ">'
      +'<span class="lrole">'+L.role+'</span>'
      +'<span class="lav ava">'+av+'</span>'
      +'<span class="lname">'+(d.winner||'—')+'</span>'
      +'<span class="lparty" style="background:'+color+'">'+(d.grp||d.party)+' · เขต'+L.dist+'</span></a>';
  }).join('');

  el('councilView').innerHTML=
    '<div class="council-wrap">'
    +'<section class="chamber">'
      +'<div class="chamber-head"><span class="cn">คณะผู้บริหารสภากรุงเทพมหานคร</span><span class="cm">ประธานสภา + รองประธาน 2 คน · วาระคราวละ 2 ปี</span></div>'
      +'<div class="cbody"><div class="leaders">'+leadersHTML+'</div>'
        +'<p class="lnote">ที่ประชุมสภา กทม. เลือก <b>ภัทราภรณ์ เก่งรุ่งเรืองชัย</b> (พรรคประชาชน เสียงข้างมาก 22 ที่นั่ง) เป็นประธานสภาฯ หญิงคนแรก เมื่อ 13 ก.ค. 2569 · กดการ์ดเพื่อดูประวัติ · ที่มา: วิกิพีเดีย/ข่าว</p>'
      +'</div>'
    +'</section>'
    +'<section class="chamber">'
      +'<div class="chamber-head"><span class="cn">แผนผังที่นั่ง สภากรุงเทพมหานคร (ส.ก.)</span><span class="cm">50 ที่นั่ง · เขตละ 1 คน · จัดกลุ่มตามพรรค</span></div>'
      +'<div class="phint"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11V6a2 2 0 0 1 4 0v5M13 11V8.5a2 2 0 0 1 4 0V11M17 11a2 2 0 0 1 4 0v3a7 7 0 0 1-7 7h-1a7 7 0 0 1-6-4l-2-3"/></svg><span>กดที่นั่งเพื่อดูการ์ดประวัติ · เอาเมาส์ชี้เพื่อดูชื่อ · เรียงซ้าย→ขวาตามจำนวนที่นั่งของแต่ละพรรค</span></div>'
      +'<div class="hemi-wrap">'+hemiSVG+'</div>'
      +'<div class="legendwrap">'+hlegend+'</div>'
    +'</section>'
    +'<section class="chamber">'
      +'<div class="chamber-head"><span class="cn">รายชื่อสมาชิกสภา กทม. (ส.ก.) 50 คน</span><span class="cm">กดชื่อเพื่อดูการ์ดประวัติ</span></div>'
      +'<div class="cbody">'
        +'<div class="cbar"><input id="rsearch" type="search" placeholder="ค้นหาชื่อ / เขต / พรรค…" autocomplete="off"><div class="cfilters">'+chips+'</div></div>'
        +'<div class="roster-grid">'+roster+'</div>'
        +'<div class="ccount" id="rcount">แสดง 50 จาก 50 คน</div>'
      +'</div>'
    +'</section>'
    +'</div>';

  // wire search + party filter (local to this render)
  var cv=el('councilView');
  var items=[].slice.call(cv.querySelectorAll('.ritem'));
  var search=cv.querySelector('#rsearch');
  var chipEls=[].slice.call(cv.querySelectorAll('.cfilter'));
  var countEl=cv.querySelector('#rcount');
  var activeParty='';
  function applyFilter(){
    var qy=(search.value||'').trim().toLowerCase(), shown=0;
    items.forEach(function(it){
      var okP=!activeParty||it.getAttribute('data-party')===activeParty;
      var okQ=!qy||it.getAttribute('data-search').indexOf(qy)>=0;
      var show=okP&&okQ; it.style.display=show?'':'none'; if(show)shown++;
    });
    countEl.textContent='แสดง '+shown+' จาก 50 คน';
  }
  search.addEventListener('input',applyFilter);
  chipEls.forEach(function(c){c.addEventListener('click',function(){
    activeParty=c.getAttribute('data-k');
    chipEls.forEach(function(x){x.classList.toggle('on',x===c);});
    applyFilter();
  });});
}

/* ---------- view switch ---------- */
window.setView=function(v){
  state.view=v; state.focus=null; state.sel=null;
  if(v!=='gov'&&SONG.player&&SONG.playing)SONG.player.pauseVideo();
  ['gov','sk','sum','council'].forEach(k=>{const b=el('tab-'+k);if(b)b.classList.toggle('active',k===v);});
  const isMap=(v==='gov'||v==='sk');
  el('mapGrid').style.display=isMap?'':'none';
  el('sumView').style.display=v==='sum'?'block':'none';
  el('councilView').style.display=v==='council'?'block':'none';
  if(v==='council'){ renderCouncil(); return; }
  if(isMap){
    el('mapTitle').textContent = v==='gov'?'แผนที่ผู้ชนะรายเขต — ผู้ว่าฯ กทม.':'แผนที่ผู้ชนะรายเขต — ส.ก. 50 เขต';
    el('mapMeta').textContent  = v==='gov'?'ชัชชาติ กวาดครบ 50 เขต':'ระบายสีตามพรรค/กลุ่มที่ชนะแต่ละเขต';
    el('mapHint').textContent  = v==='gov'?'ชี้ที่เขตเพื่อดูชื่อเขต · ผลผู้ว่าฯ นับรวมทั้ง กทม. (ไม่มีแยกรายเขตจาก กกต.)':'ชี้/แตะเขตเพื่อดูผู้ชนะและคะแนน · แตะชิปพรรคเพื่อไฮไลต์';
    el('mapNote').innerHTML = v==='gov'
      ? 'แผนที่แสดง<strong>ผู้ชนะรายเขต</strong> ซึ่งชัชชาติ สิทธิพันธุ์ (เบอร์ 9) ชนะทั้ง 50 เขต — คะแนนผู้ว่าฯ เป็นการนับรวมทั้งกรุงเทพมหานคร กกต. ไม่ได้ประกาศแยกเป็นรายเขต'
      : 'สมาชิกสภากรุงเทพมหานคร (ส.ก.) เลือกตั้งแบบแบ่งเขต เขตละ 1 คน รวม 50 คน — สีของแต่ละเขตคือพรรค/กลุ่มของผู้ชนะ';
    // badge
    el('mapBadge').style.display=v==='gov'?'':'none';
    if(v==='gov'){const pf=(PH.gov&&PH.gov[9])?`<img src="bkk-photos/${PH.gov[9]}" alt="" loading="lazy" decoding="async" onerror="this.remove()">`:''; el('mapBadge').innerHTML=`<div class="mv ava" style="color:${GOV.winnerColor}">9${pf}</div><div class="mt"><b>ชัชชาติ สิทธิพันธุ์</b><small>ชนะ 50 / 50 เขต · ${GOV.candidates[0].pct}%</small></div>`;}
    recolor(); renderLegend(); renderPanel();
  } else { renderSummary(); }
};

el('foot').innerHTML='ข้อมูลผลการเลือกตั้ง (อย่างไม่เป็นทางการ · รอ กกต. ประกาศรับรอง) · ที่มา: '+
  '<a href="https://th.wikipedia.org/wiki/การเลือกตั้งผู้ว่าราชการกรุงเทพมหานคร_พ.ศ._2569" target="_blank" rel="noopener">วิกิพีเดีย</a>, '+
  '<a href="https://www.thaipbs.or.th/bkkelection69" target="_blank" rel="noopener">Thai PBS</a>, '+
  '<a href="https://www.ect.go.th" target="_blank" rel="noopener">สำนักงาน กกต.</a> · '+
  'ขอบเขตเขต กทม.: OpenGISData-Thailand (chingchai) · จัดทำเพื่อการเรียนรู้';

/* ---------- ส.ก. profile card ---------- */
var skOv=null;
function closeSKCard(){ if(skOv){ skOv.classList.remove('on'); document.body.style.overflow=''; } }
function openSKCard(dist){
  var d=SK.districts[dist]; if(!d) return;
  var color=(SK.colors&&SK.colors[d.party])||'#8A94A6', acc2=shade(color);
  var f=PH.sk&&PH.sk[dist];
  var pObj=SK.parties.find(function(p){return p.key===d.party;});
  var pSeats=pObj?pObj.seats:'—';
  var initial=(d.winner||'?').trim().charAt(0)||'?';
  var q=encodeURIComponent(d.winner?(d.winner+' สมาชิกสภากรุงเทพมหานคร เขต'+dist):('ส.ก. เขต'+dist+' กรุงเทพมหานคร 2569'));
  var photo=f?('<img src="bkk-photos/'+f+'" alt="'+(d.winner||'')+'" decoding="async" onerror="this.remove()">'):initial;
  if(!skOv){
    skOv=document.createElement('div'); skOv.className='skcard-ov';
    skOv.addEventListener('click',function(e){ if(e.target===skOv) closeSKCard(); });
    document.body.appendChild(skOv);
  }
  skOv.innerHTML=
    '<div class="skcard" role="dialog" aria-modal="true" aria-labelledby="skcName" style="--acc:'+color+';--acc2:'+acc2+'">'
    +'<button class="skcard-x" type="button" aria-label="ปิด">✕</button>'
    +'<div class="skcard-hero"><div class="skcard-photo">'+photo+'</div></div>'
    +'<div class="skcard-body">'
    +'<span class="skcard-party" style="background:'+color+'">'+(d.grp||d.party)+'</span>'
    +'<h3 id="skcName">'+(d.winner||'—')+'</h3>'
    +'<div class="skcard-role">สมาชิกสภากรุงเทพมหานคร (ส.ก.) · เขต'+dist+'</div>'
    +'<div class="skcard-stats">'
      +'<div><b>'+fmt(d.votes)+'</b><span>คะแนนที่ได้</span></div>'
      +'<div><b>'+d.pct+'%</b><span>สัดส่วนในเขต</span></div>'
      +'<div><b>'+pSeats+'</b><span>ที่นั่งของกลุ่ม</span></div>'
    +'</div>'
    +'<p class="skcard-note">ชนะการเลือกตั้ง ส.ก. เขต'+dist+' (ผลอย่างไม่เป็นทางการ 2569) · การ์ดนี้แสดงเฉพาะผลคะแนนที่ตรวจสอบได้จาก กกต./วิกิพีเดีย ไม่มีการแต่งประวัติเพิ่มเติม</p>'
    +'<a class="skcard-btn" href="https://www.google.com/search?q='+q+'" target="_blank" rel="noopener noreferrer">'
      +'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>ค้นหาประวัติเพิ่มเติมใน Google</a>'
    +'</div>';
  skOv.querySelector('.skcard-x').addEventListener('click',closeSKCard);
  skOv.classList.add('on');
  document.body.style.overflow='hidden';
  var x=skOv.querySelector('.skcard-x'); if(x) x.focus();
}
document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeSKCard(); });
document.addEventListener('click',function(e){
  var a=e.target.closest&&e.target.closest('[data-dist]');
  if(!a) return;
  if(e.metaKey||e.ctrlKey||e.shiftKey||e.button===1) return; // ปล่อยให้เปิด Google แท็บใหม่
  e.preventDefault();
  openSKCard(a.getAttribute('data-dist'));
});

// init
setView('gov');
})();
</script>
