  /* ---- legend ---- */

  document.getElementById('legendbar').innerHTML=
    Object.entries(winCounts).sort((a,b)=>b[1]-a[1]).map(([c,n])=>
      `<span class="li"><span class="sw" style="background:${colorOf(c)}"></span>${shortOf(c)}<b>${n}</b></span>`).join('');

  /* ---- zoom & pan ---- */
  let scale=1,tx=0,ty=0,lastLabelScale=-1;
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  function apply(){
    if(scale<1)scale=1;
    // clamp ให้แผนที่เต็มกรอบเสมอ ไม่หลุดไปเจอพื้นหลังเทา — แพนตอนซูมเข้าได้ลื่น ไม่เด้งกลับ
    tx=clamp(tx, M.width*(1-scale), 0);

  }
  function updateLabels(force){
    if(!force && lastLabelScale>0 && Math.abs(scale/lastLabelScale-1)<0.06) return;
    lastLabelScale=scale;
    const sorted=[...labelEls].sort((a,b)=>b.area-a.area), kept=[];
    for(const l of sorted){
      if(l.el.style.display==='none'){ l.el.classList.remove('show'); continue; }
      const fs=clamp(l.base/scale, 2.4, 60);
      l.el.setAttribute('font-size',fs); l.el.setAttribute('stroke-width',fs*0.2);
      const b=l.el.getBBox(), pad=fs*0.28;
      const x0=b.x-pad,y0=b.y-pad,x1=b.x+b.width+pad,y1=b.y+b.height+pad;
      let ok=true;
      for(const k of kept){ if(!(x1<k[0]||x0>k[2]||y1<k[1]||y0>k[3])){ok=false;break;} }
      if(ok){ kept.push([x0,y0,x1,y1]); l.el.classList.add('show'); }
      else l.el.classList.remove('show');
    }
  }
  function vbPoint(cx,cy){const pt=svg.createSVGPoint();pt.x=cx;pt.y=cy;return pt.matrixTransform(svg.getScreenCTM().inverse());}
  function zoomAt(vx,vy,f){const ns=clamp(scale*f,1,6),k=ns/scale;tx=vx-(vx-tx)*k;ty=vy-(vy-ty)*k;scale=ns;apply();}
  function centerPt(){const r=svg.getBoundingClientRect();return vbPoint(r.left+r.width/2,r.top+r.height/2);}
  // ปุ่มสลับ ซ่อน/แสดง วงหมายเลขเขต (จำสถานะข้ามจังหวัด — set display ที่กลุ่ม mkG ทีเดียว)
  const mkToggleBtn=document.getElementById('mktoggle'); let markersHidden=false;
  mkToggleBtn.onclick=()=>{markersHidden=!markersHidden;mkG.style.display=markersHidden?'none':'';
    mkToggleBtn.classList.toggle('off',markersHidden);mkToggleBtn.setAttribute('aria-pressed',String(!markersHidden));};
  document.getElementById('zin').onclick=()=>{const p=centerPt();zoomAt(p.x,p.y,1.45);};
  // ซูมออกจนสุดขณะกำลังดูจังหวัด → เด้งกลับไปหน้าเลือกจังหวัด (เหมือนเว็บอ้างอิง)
  function maybeExitProvince(){if(curProvince&&scale<=1.1){backToAll();return true;}return false;}
  document.getElementById('zout').onclick=()=>{const p=centerPt();zoomAt(p.x,p.y,1/1.45);if(!maybeExitProvince()&&scale<=1.001){tx=0;ty=0;apply();}};
  svg.addEventListener('wheel',e=>{e.preventDefault();const p=vbPoint(e.clientX,e.clientY);zoomAt(p.x,p.y,e.deltaY<0?1.12:1/1.12);if(e.deltaY>0)maybeExitProvince();},{passive:false});
  const pointers=new Map(); let panState=null, pinchPrev=null, moved=false, captured=false, lastTapTime=0, pinching=false;
  svg.addEventListener('pointerdown',e=>{
    pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pointers.size===1){panState={x:e.clientX,y:e.clientY,tx,ty,id:e.pointerId,downEl:e.target};moved=false;pinching=false;}
    else{panState=null;pinchPrev=null;}
  });
  svg.addEventListener('pointermove',e=>{
    const p=pointers.get(e.pointerId); if(!p)return; p.x=e.clientX; p.y=e.clientY;
    const r=svg.getBoundingClientRect(),rs=Math.min(r.width/M.width,r.height/M.height),sx=1/rs,sy=1/rs;
    if(pointers.size>=2){
      const a=[...pointers.values()],p1=a[0],p2=a[1];
      const dist=Math.hypot(p1.x-p2.x,p1.y-p2.y),mx=(p1.x+p2.x)/2,my=(p1.y+p2.y)/2;
      if(pinchPrev&&pinchPrev.dist>0){

    if(tap && downEl){

      else if(downEl.classList&&downEl.classList.contains('pv')){const th=en2th[downEl.dataset.en];if(th&&provStats[th])selectProvince(th);}
    }
    if(pointers.size===0&&pinching){pinching=false;maybeExitProvince();}
  }
  svg.addEventListener('pointerup',endPointer); svg.addEventListener('pointercancel',endPointer);

  /* ---- tooltip ---- */
  const tip=document.getElementById('maptip');
  function showTip(en,evt){const th=en2th[en],st=th?provStats[th]:null;
    tip.innerHTML=st?`<div class="tt-prov">${th}</div><div class="tt-win"><span class="sw" style="background:${colorOf(st.winner)}"></span>${shortOf(st.winner)} · ${st.seats} เขต</div>`

    tip.classList.add('on');moveTip(evt);}
  function moveTip(evt){const pad=14;let x=evt.clientX+pad,y=evt.clientY+pad;const r=tip.getBoundingClientRect();
    if(x+r.width>innerWidth-8)x=evt.clientX-r.width-pad;if(y+r.height>innerHeight-8)y=evt.clientY-r.height-pad;tip.style.left=x+'px';tip.style.top=y+'px';}
  const canHover=matchMedia('(hover:hover) and (pointer:fine)').matches; // hover tooltip = desktop only; on touch a tap fires mouseenter but no mouseleave → tip sticks
  Object.values(pathEls).forEach(p=>{
    if(canHover){

  });
  function highlight(th){Object.entries(pathEls).forEach(([en,p])=>{const m=th&&en2th[en]===th;p.classList.toggle('sel',!!th&&m);p.classList.toggle('dim',!!th&&!m);});}
  // กลับไปหน้าเลือกจังหวัด: บนมือถือต้องพับ bottom sheet ลงด้วย ไม่งั้นแผ่นจะค้างบานเต็มจอบังแผนที่จนแพน/ซูมไม่ได้
  function backToAll(){curProvince=null;clearMarkers();highlight(null);scale=1;tx=0;ty=0;apply();renderList();expandSheet(false);}
  function zoomToProvince(th){const en=th2en[th],p=pathEls[en];if(!p)return;const bb=p.getBBox(),cx=bb.x+bb.width/2,cy=bb.y+bb.height/2,fill=.30;
    const s=clamp(Math.min(M.width*fill/bb.width,M.height*fill/bb.height),1,3.4);scale=s;tx=M.width/2-cx*s;ty=M.height/2-cy*s;apply();}

  /* ---- district markers ---- */
  let hiddenLabel=null;
  const DIDX=window.DISTRICT_INDEX||{};
  const getDist=th=>(window.DISTRICT_SHAPES&&window.DISTRICT_SHAPES[th])||null;
  const distLoading={};
  // โหลดข้อมูลตำบลของจังหวัดแบบ lazy: แตะจังหวัดไหนค่อยโหลดไฟล์นั้น → หน้าเริ่มต้นเบา สเกลถึง 77 จังหวัดได้
  function ensureDistrict(th,cb){
    if(getDist(th))return cb(true);
    const sl=DIDX[th]; if(!sl)return cb(false);
    if(distLoading[th]){distLoading[th].push(cb);return;}
    distLoading[th]=[cb];
    const s=document.createElement('script'); s.src='district-shapes/'+sl+'.js';
    s.onload=()=>{const cbs=distLoading[th];delete distLoading[th];cbs.forEach(c=>c(!!getDist(th)));};
    s.onerror=()=>{const cbs=distLoading[th];delete distLoading[th];cbs.forEach(c=>c(false));};
    document.head.appendChild(s);
  }
  let distProv=null;
  // วาดโมเสกตำบลลงสีตามเขตเลือกตั้ง + เส้นแบ่งเขต (จังหวัดที่มีข้อมูลแล้ว)
  function clearDistricts(){dg.textContent='';if(distProv){const p=pathEls[th2en[distProv]];if(p)p.style.fill='';distProv=null;}}
  function renderDistricts(th){
    clearDistricts();
    const D2=getDist(th); if(!D2) return false;
    const recs=zoneRecs.filter(r=>r.prov===th);
    const zc={}; recs.forEach(r=>{zc[+r.no]=colorOf(r.code);});
    const pe=pathEls[th2en[th]]; if(pe){pe.style.fill='#e9eff3';distProv=th;}  // ฐานจังหวัดเป็นกลาง กันสีโผล่ขอบ
    const frag=document.createDocumentFragment();
    D2.tambons.forEach(t=>{
      const p=document.createElementNS(NS,'path');
      p.setAttribute('d',t.d); p.setAttribute('class','tam');
      p.setAttribute('fill', zc[t.z]||'#c2b8ac');
      p.dataset.z=t.z; p.dataset.tam=t.tam; p.dataset.amp=t.amp;
      if(canHover){
        p.addEventListener('mouseenter',e=>{tip.innerHTML=`<div class="tt-prov">ต.${t.tam}</div><div class="tt-win"><span class="sw" style="background:${zc[t.z]||'#999'}"></span>อ.${t.amp} · เขต ${t.z}</div>`;tip.classList.add('on');moveTip(e);});
        p.addEventListener('mousemove',moveTip);
        p.addEventListener('mouseleave',()=>tip.classList.remove('on'));
      }
      frag.appendChild(p);
    });
    if(D2.bounds){const b=document.createElementNS(NS,'path');b.setAttribute('d',D2.bounds);b.setAttribute('class','zbound');frag.appendChild(b);}
    dg.appendChild(frag);
    return true;
  }
  function clearMarkers(){mkG.textContent='';clearDistricts();if(hiddenLabel){hiddenLabel.style.display='';hiddenLabel=null;}updateLabels(true);}
  function spread(points,N){if(points.length<=N)return points.slice();const chosen=[points[Math.floor(points.length/2)]];
    while(chosen.length<N){let best=null,bd=-1;for(const p of points){let d=Infinity;for(const c of chosen){const dd=(c[0]-p[0])**2+(c[1]-p[1])**2;if(dd<d)d=dd;}if(d>bd){bd=d;best=p;}}chosen.push(best);}return chosen;}
  function renderMarkers(th){
    clearMarkers();const en=th2en[th],pe=pathEls[en];if(!pe)return;
    ensureDistrict(th,function(hasData){
      if(curProvince!==th)return;                 // เปลี่ยนจังหวัดระหว่างโหลดไฟล์ → ทิ้งผลเก่า
      const hasDist=hasData&&renderDistricts(th);
      const recs=zoneRecs.filter(r=>r.prov===th).sort((a,b)=>(+a.no)-(+b.no));const N=recs.length,bb=pe.getBBox();
      const cx=bb.x+bb.width/2, cy=bb.y+bb.height/2;
      let pts, r;
      const D2=hasDist?getDist(th):null;
      if(D2&&D2.labels&&D2.labels.length){
        // วงหมายเลขเขตวางที่ "ศูนย์ถ่วงพื้นที่จริง" ของแต่ละเขต (ไม่ใช่โปรยมั่ว)
        const byNo={};D2.labels.forEach(l=>{byNo[+l.no]=[l.x,l.y];});

        pts=recs.map(rec=>{const q=byNo[+rec.no];return q?[q[0],q[1]]:[cx,cy];});
        // คลายเฉพาะวงที่ทับกัน (จังหวัดเขตถี่อย่างขอนแก่น/โคราช) — ดันออกเบาๆ ไม่ดึงออกจากเขต
        const minSep=2*r*1.02;
        for(let it=0;it<22;it++)for(let i=0;i<N;i++)for(let k=i+1;k<N;k++){
          let dx=pts[k][0]-pts[i][0],dy=pts[k][1]-pts[i][1],d=Math.hypot(dx,dy)||0.001;
          if(d<minSep){const push=(minSep-d)/2;dx/=d;dy/=d;pts[i][0]-=dx*push;pts[i][1]-=dy*push;pts[k][0]+=dx*push;pts[k][1]+=dy*push;}
        }
      } else {
        const inFill=(x,y)=>{const pt=svg.createSVGPoint();pt.x=x;pt.y=y;try{return pe.isPointInFill(pt);}catch(_){return true;}};
        const inside=[],g=Math.max(8,Math.ceil(Math.sqrt(N)*3.4));
        for(let i=0;i<g;i++)for(let j=0;j<g;j++){const x=bb.x+bb.width*(i+.5)/g,y=bb.y+bb.height*(j+.5)/g;if(inFill(x,y))inside.push([x,y]);}
        if(!inside.length)inside.push([cx,cy]);
        // รัศมีวงกลม: อิงพื้นที่จริงในจังหวัด ÷ จำนวนเขต (ไม่ตั้งพื้นขั้นต่ำใหญ่เกินไป) → จังหวัดเขตเยอะอย่าง กทม. 33 เขต จะไม่ทับกัน
        const fillFrac=Math.max(inside.length/(g*g),0.3), fillArea=fillFrac*bb.width*bb.height;
        r=Math.max(2.6,Math.min(Math.min(bb.width,bb.height)/(Math.sqrt(N)+2.6), 0.46*Math.sqrt(fillArea/N)));
        // กระจายจุดให้ห่างกันมากสุดเป็นจุดเริ่ม แล้ว “ผลัก” จุดที่ใกล้กันออกจากกันจนไม่ทับ (de-cluster) พร้อมดึงให้อยู่ในเขตจังหวัด
        const minSep=2*r*1.06;
        pts=spread(inside,N).map(p=>[p[0],p[1]]);
        for(let it=0;it<60;it++){
          for(let i=0;i<N;i++)for(let k=i+1;k<N;k++){
            let dx=pts[k][0]-pts[i][0],dy=pts[k][1]-pts[i][1],d=Math.hypot(dx,dy)||0.001;
            if(d<minSep){const push=(minSep-d)/2;dx/=d;dy/=d;pts[i][0]-=dx*push;pts[i][1]-=dy*push;pts[k][0]+=dx*push;pts[k][1]+=dy*push;}
          }
          for(const p of pts){
            p[0]=Math.max(bb.x+r,Math.min(bb.x+bb.width-r,p[0]));
            p[1]=Math.max(bb.y+r,Math.min(bb.y+bb.height-r,p[1]));
            if(it>=40&&!inFill(p[0],p[1])){p[0]+=(cx-p[0])*0.18;p[1]+=(cy-p[1])*0.18;}
          }
        }
        pts.sort((a,b)=>a[1]-b[1]||a[0]-b[0]);
      }
      recs.forEach((rec,idx)=>{const p=pts[idx]||[cx,cy];
        const grp=document.createElementNS(NS,'g');grp.setAttribute('class','mk');grp.dataset.no=rec.no;
        grp.style.setProperty('--c', colorOf(rec.code));   // สีวงกลม = สีพรรคที่ชนะเขตนี้
        const c=document.createElementNS(NS,'circle');c.setAttribute('cx',p[0]);c.setAttribute('cy',p[1]);c.setAttribute('r',r);
        const t=document.createElementNS(NS,'text');t.setAttribute('x',p[0]);t.setAttribute('y',p[1]);t.setAttribute('font-size',r*1.05);t.textContent=rec.no;
        grp.appendChild(c);grp.appendChild(t);mkG.appendChild(grp);});
      const lab=labelEls.find(l=>l.en===en);if(lab){lab.el.style.display='none';hiddenLabel=lab.el;}
      updateLabels(true);
    });
  }
  function flashCard(no){const card=document.querySelector('#panelScroll .ccard[data-no="'+no+'"]');if(card){card.classList.add('flash');card.scrollIntoView({behavior:'smooth',block:'center'});setTimeout(()=>card.classList.remove('flash'),1500);}}
  function flashMarker(no){const mk=mkG.querySelector('.mk[data-no="'+no+'"]');if(mk){mk.classList.add('flash');setTimeout(()=>mk.classList.remove('flash'),1500);}}

  /* ---- panel content ---- */
  const panelScroll=document.getElementById('panelScroll'), search=document.getElementById('search');
  let curProvince=null;
  function initialOf(name){const t=name.replace(/^(นางสาว|นาง|นาย|ว่าที่ร้อยตรีหญิง|ว่าที่ร้อยตรี|ว่าที่|ดร\.|ผศ\.|รศ\.|ศ\.|พล[^ ]*|พ\.[^ ]*|ร\.[^ ]*|น\.[^ ]*|จ\.[^ ]*)\s*/,'').trim();return t[0]||name.replace(/\s/g,'')[0]||'•';}
  function areaOf(r){return (window.ZONE_AREAS&&window.ZONE_AREAS[r.prov+'|'+(+r.no)])||'';}
  function candidateCard(r,showProv){
    const col=colorOf(r.code), ph=window.PHOTOS&&window.PHOTOS[r.name], area=areaOf(r);
    const inner = ph ? `<img class="cphoto" src="photos/${encodeURIComponent(ph)}" alt="" loading="lazy">` : initialOf(r.name);
    return `<div class="ccard" data-no="${r.no}" data-prov="${r.prov}">
      <div class="cav" style="background:${col};box-shadow:0 0 0 3px #fff,0 0 0 4px ${col}">${inner}<span class="cavno">${r.no}</span></div>
      <div class="cinfo"><div class="ctop"><span class="cname">${r.name}</span><span class="cdist">${showProv?r.prov+' ':''}เขต ${r.no}</span></div>
      <div class="cbot"><span class="cpt"><span class="sw" style="background:${col}"></span>${shortOf(r.code)}</span>${r.votes!=null?`<span class="cvt">${fmtN(r.votes)} คะแนน</span>`:''}</div>
      ${area?`<div class="carea"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg><span class="ctxt">${area}</span></div>`:''}</div></div>`;}
  function provinceRow(th){const st=provStats[th];return `<div class="prow" data-prov="${th}">
      <span class="dot" style="background:${colorOf(st.winner)}"></span><span class="pn">${th}</span>
      <span class="zc"><b>${st.seats}</b> เขต</span>
      <svg class="arr" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="m9 6 6 6-6 6"/></svg></div>`;}
  function renderList(){
    panelScroll.innerHTML=`<div class="list-head">เลือกจังหวัด <span class="cnt">77 จังหวัด</span></div>`+provNames.map(provinceRow).join('');
    bindRows();
  }
  function renderDetail(th){
    const st=provStats[th], recs=zoneRecs.filter(r=>r.prov===th).sort((a,b)=>(+a.no)-(+b.no));
    panelScroll.innerHTML=`<div class="dback" id="dback">‹ กลับไปทุกจังหวัด</div>
      <div class="dhead"><div class="dn">${th}</div><div class="dmeta"><span>${st.seats} เขตเลือกตั้ง</span>
        <span class="dwin"><span class="sw" style="background:${colorOf(st.winner)}"></span>ชนะ <b>${shortOf(st.winner)}</b></span></div></div>
      <div class="dnote">แตะวงกลมหมายเลขเขตบนแผนที่เพื่อไฮไลต์ผู้สมัคร · ผู้ที่ยังไม่มีรูปจะแสดงเป็นอักษรย่อตามสีพรรค</div>`+
      recs.map(r=>candidateCard(r,false)).join('');
    renderMarkers(th);
    panelScroll.querySelectorAll('.ccard').forEach(c=>c.onclick=()=>flashMarker(c.dataset.no));
    document.getElementById('dback').onclick=()=>backToAll();
    panelScroll.scrollTop=0;
  }
  function bindRows(){panelScroll.querySelectorAll('.prow').forEach(row=>{
    row.onclick=()=>selectProvince(row.dataset.prov);
    row.onmouseenter=()=>{const p=pathEls[th2en[row.dataset.prov]];if(p&&!curProvince)p.classList.add('sel');};
    row.onmouseleave=()=>{const p=pathEls[th2en[row.dataset.prov]];if(p&&!curProvince)p.classList.remove('sel');};});}
  function selectProvince(th){curProvince=th;highlight(th);zoomToProvince(th);renderDetail(th);if(isMobile())expandSheet(true);}
  function renderSearch(q){q=q.trim().toLowerCase();
    if(!q){curProvince?renderDetail(curProvince):renderList();return;}
    clearMarkers();
    const hits=zoneRecs.filter(r=>r.name.toLowerCase().includes(q)||r.prov.toLowerCase().includes(q)||areaOf(r).toLowerCase().includes(q));
    if(!hits.length){panelScroll.innerHTML='<div class="empty">ไม่พบรายชื่อหรือจังหวัดที่ตรงกับคำค้น</div>';return;}
    panelScroll.innerHTML=`<div class="list-head">ผลการค้นหา <span class="cnt">${hits.length} คน</span></div>`+
      hits.slice(0,120).map(r=>candidateCard(r,true)).join('')+(hits.length>120?`<div class="empty">แสดง 120 คนแรกจาก ${hits.length}</div>`:'');
    panelScroll.querySelectorAll('.ccard[data-prov]').forEach(row=>row.onclick=()=>{search.value='';selectProvince(row.dataset.prov);});
  }
  // แตะบรรทัดพื้นที่เขตเพื่อกาง/พับข้อความเต็ม โดยไม่ไปกระตุ้น onclick ของการ์ด
  panelScroll.addEventListener('click',e=>{const a=e.target.closest&&e.target.closest('.carea');if(a){e.stopPropagation();a.classList.toggle('open');}},true);
  search.addEventListener('input',e=>renderSearch(e.target.value));
  search.addEventListener('focus',()=>{if(isMobile())expandSheet(true);});
  renderList();

  /* ---- bottom sheet (mobile): คุมด้วยการ "ปัด" — ปัดขึ้น=ขยาย · ปัดลง=ย่อ · ปัดลงต่อ/แรง=ออก(กลับทุกจังหวัด) ---- */
  const panel=document.getElementById('panel'), grabber=document.getElementById('grabber'),
        legendbar=document.getElementById('legendbar');
  const PEEK=104, FLICK=0.45;                       // FLICK = px/ms ความเร็วขั้นต่ำที่นับว่า "สะบัด"
  function expandSheet(on){ if(isMobile()) panel.classList.toggle('expanded',on); }
  function sheetMaxT(){ return Math.max(0, panel.getBoundingClientRect().height - PEEK); }

  let sd=null;
  function sheetDown(e){
    if(!isMobile()) return;
    sd={id:e.pointerId, src:e.currentTarget, y0:e.clientY, t0:Date.now(),
        MT:sheetMaxT(), expanded:panel.classList.contains('expanded'), captured:false};
    sd.base = sd.expanded ? 0 : sd.MT;
  }
  function sheetMove(e){
    if(!sd || e.pointerId!==sd.id) return;
    const dy=e.clientY-sd.y0;
    if(!sd.captured){
      if(Math.abs(dy)<6) return;                     // ยังไม่ชัดว่าตั้งใจปัด
      // ในรายการที่กางอยู่: ปัดลงเฉพาะตอนเลื่อนสุดบนสุดเท่านั้นที่ใช้ย่อแผ่น นอกนั้นปล่อยให้เลื่อนรายการ
      if(sd.src===panelScroll && sd.expanded && !(dy>0 && panelScroll.scrollTop<=0)){ sd=null; return; }
      sd.captured=true; panel.classList.add('dragging');
      try{sd.src.setPointerCapture(sd.id)}catch(_){}
    }
    const over = sd.expanded?120:90;                  // ลากเลย peek ลงได้นิดเพื่อสั่ง "ออก"
    panel.style.transform='translateY('+clamp(sd.base+dy,0,sd.MT+over)+'px)';
  }
  function sheetUp(e){
    if(!sd || e.pointerId!==sd.id) return;
    const MT=sd.MT, dy=e.clientY-sd.y0, dt=Math.max(1,Date.now()-sd.t0), v=dy/dt; // v>0 = ปัดลง
    const m=/translateY\(([-\d.]+)px\)/.exec(panel.style.transform), t=m?+m[1]:sd.base;
    const wasExpanded=sd.expanded, captured=sd.captured, src=sd.src;
    panel.style.transform=''; panel.classList.remove('dragging');
    try{src.releasePointerCapture(sd.id)}catch(_){}
    sd=null;
    if(!captured){ if(src===grabber) panel.classList.toggle('expanded'); return; } // แตะเบา ๆ ก็ยังสลับได้
    // ปัดออก: ลากเลย peek ลงไป หรือสะบัดลงแรงตอนอยู่ที่ peek ขณะดูจังหวัด → กลับหน้าเลือกจังหวัด
    if(curProvince && (t>MT+18 || (!wasExpanded && (v>FLICK || dy>56)))){ backToAll(); return; }
    if(v<-FLICK)      panel.classList.add('expanded');             // สะบัดขึ้น → ขยาย
    else if(v>FLICK)  panel.classList.remove('expanded');          // สะบัดลง → ย่อ
    else              panel.classList.toggle('expanded', t<MT/2);  // ไม่สะบัด → ตัดสินตามตำแหน่ง
  }
  [grabber, legendbar, panelScroll].forEach(el=>{
    el.addEventListener('pointerdown',sheetDown);
    el.addEventListener('pointermove',sheetMove);
    el.addEventListener('pointerup',sheetUp);
    el.addEventListener('pointercancel',sheetUp);
  });

  apply();
})();
</script>
<script src="glow.js"></script>
<script src="../js/theme-toggle-drag.js"></script>
<script src="../js/ai-chat.js"></script>
</body>
