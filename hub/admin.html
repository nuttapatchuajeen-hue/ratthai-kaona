<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>แผงแอดมิน · รัฐไทยก้าวหน้า</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700;900&family=IBM+Plex+Mono:wght@400;500&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:#020508; --bg-dark:#070D14; --accent-cyan:#00E5FF; --accent-orange:#FF5C1A;
    --text-primary:#DCE8F0; --text-body:#A7BDCC; --text-muted:#4A6070;
    --line:rgba(0,229,255,0.13); --danger:#FF4D5E;
    --font-thai:'Prompt','Sarabun',sans-serif; --font-sub:'Rajdhani','Sarabun',sans-serif;
    --font-mono:'IBM Plex Mono','Sarabun',monospace;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg-deep); color:var(--text-primary); font-family:var(--font-sub);
    min-height:100vh; line-height:1.6;
    background-image:radial-gradient(circle at 20% -10%, rgba(0,229,255,0.06), transparent 45%); }
  a { color:var(--accent-cyan); }
  :focus-visible { outline:2px solid var(--accent-cyan); outline-offset:3px; }
  .kicker { font-family:var(--font-mono); font-size:0.62rem; letter-spacing:0.25em;
    text-transform:uppercase; color:var(--accent-cyan); display:block; margin-bottom:0.5rem; }
  h1 { font-family:var(--font-thai); font-weight:900; font-size:1.6rem; }

  /* ── login ── */
  #login-view { min-height:100vh; display:grid; place-items:center; padding:1.5rem; }
  .login-card { width:100%; max-width:380px; background:var(--bg-dark);
    border:1px solid var(--line); border-radius:16px; padding:2.2rem 1.8rem;
    box-shadow:0 24px 60px rgba(0,0,0,0.5); }
  .login-card h1 { font-size:1.4rem; margin-bottom:0.3rem; }
  .login-card p.sub { color:var(--text-muted); font-size:0.85rem; margin-bottom:1.6rem; }
  label { display:block; font-family:var(--font-thai); font-weight:500; font-size:0.85rem;
    color:var(--text-body); margin-bottom:0.4rem; }
  input[type=password] { width:100%; background:rgba(0,229,255,0.04); color:var(--text-primary);
    border:1px solid var(--line); border-radius:10px; padding:0.7rem 0.9rem;
    font-family:var(--font-mono); font-size:0.95rem; }
  input[type=password]:focus { border-color:var(--accent-cyan); outline:none; }
  .btn { font-family:var(--font-thai); font-weight:700; font-size:0.92rem; cursor:pointer;
    border-radius:10px; padding:0.7rem 1.2rem; border:1px solid var(--line);
    background:rgba(0,229,255,0.06); color:var(--text-body); transition:.15s; }
  .btn:hover { border-color:rgba(0,229,255,0.55); color:var(--text-primary); }
  .btn-primary { background:linear-gradient(100deg,var(--accent-cyan),#6df3ff);
    color:#021018; border-color:transparent; width:100%; margin-top:1.2rem; }
  .btn-primary:hover { filter:brightness(1.08); color:#021018; }
  .btn:disabled { opacity:0.5; cursor:not-allowed; }
  .msg { font-family:var(--font-thai); font-size:0.85rem; margin-top:1rem; min-height:1.2em; }
  .msg.err { color:var(--danger); }
  .msg.ok { color:var(--accent-cyan); }

  /* ── dashboard ── */
  #dash-view { display:none; max-width:1000px; margin:0 auto; padding:1.5rem 1.2rem 4rem; }
  .topbar { display:flex; align-items:center; justify-content:space-between; gap:1rem;
    flex-wrap:wrap; padding-bottom:1.2rem; border-bottom:1px solid var(--line); margin-bottom:1.6rem; }
  .topbar .right { display:flex; align-items:center; gap:0.7rem; flex-wrap:wrap; }
  .session-note { font-family:var(--font-mono); font-size:0.68rem; color:var(--text-muted); }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:1rem; margin-bottom:1.8rem; }
  .card { background:var(--bg-dark); border:1px solid var(--line); border-radius:14px; padding:1.2rem; }
  .card .label { font-family:var(--font-mono); font-size:0.6rem; letter-spacing:0.2em;
    text-transform:uppercase; color:var(--accent-cyan); }
  .card .num { font-family:var(--font-thai); font-weight:900; font-size:2rem; color:var(--text-primary);
    line-height:1.1; margin-top:0.3rem; }
  .card .num small { font-size:0.9rem; font-weight:500; color:var(--text-muted); }
  .section-title { font-family:var(--font-thai); font-weight:700; font-size:1.15rem;
    margin:0 0 0.9rem; display:flex; align-items:center; gap:0.6rem; }
  .section-title .count { font-family:var(--font-mono); font-size:0.7rem; color:var(--text-muted); }
  .row-item { background:var(--bg-dark); border:1px solid var(--line); border-radius:12px;
    padding:1rem 1.1rem; margin-bottom:0.8rem; display:flex; gap:1rem; align-items:flex-start;
    justify-content:space-between; }
  .row-item .meta { font-family:var(--font-mono); font-size:0.66rem; color:var(--text-muted);
    letter-spacing:0.05em; margin-bottom:0.35rem; }
  .row-item .demo { font-size:0.78rem; color:var(--text-body); margin-bottom:0.4rem; }
  .row-item .demo span { display:inline-block; padding:0.05rem 0.5rem; margin-right:0.3rem;
    border:1px solid var(--line); border-radius:999px; font-family:var(--font-mono); font-size:0.66rem; }
  .row-item .txt { color:var(--text-primary); font-size:0.95rem; white-space:pre-wrap; word-break:break-word; }
  .row-item .txt.empty { color:var(--text-muted); font-style:italic; }
  .row-item .body { flex:1; min-width:0; }
  .btn-del { flex:none; font-family:var(--font-thai); font-weight:600; font-size:0.78rem;
    cursor:pointer; border:1px solid rgba(255,77,94,0.4); background:rgba(255,77,94,0.08);
    color:var(--danger); border-radius:8px; padding:0.35rem 0.7rem; }
  .btn-del:hover { background:rgba(255,77,94,0.18); }
  .empty-state { color:var(--text-muted); font-family:var(--font-thai); padding:2rem; text-align:center; }
  .spinner { color:var(--text-muted); font-family:var(--font-mono); font-size:0.8rem; padding:2rem; text-align:center; }
</style>
</head>
<body>

<!-- ════ LOGIN ════ -->
<section id="login-view">
  <form class="login-card" id="login-form" autocomplete="off">
    <span class="kicker">รัฐไทยก้าวหน้า · admin</span>
    <h1>เข้าสู่ระบบแอดมิน</h1>
    <p class="sub">สำหรับผู้ดูแลเว็บไซต์เท่านั้น</p>
    <label for="pw">รหัสผ่าน</label>
    <input type="password" id="pw" autocomplete="current-password" required>
    <button class="btn btn-primary" id="login-btn" type="submit">เข้าสู่ระบบ</button>
    <div class="msg" id="login-msg"></div>
  </form>
</section>

<!-- ════ DASHBOARD ════ -->
<main id="dash-view">
  <div class="topbar">
    <div>
      <span class="kicker">แผงควบคุม</span>
      <h1>จัดการแบบประเมิน</h1>
    </div>
    <div class="right">
      <span class="session-note" id="session-note"></span>
      <button class="btn" id="csv-btn" type="button">⬇ ดาวน์โหลด CSV</button>
      <button class="btn" id="refresh-btn" type="button">⟳ รีเฟรช</button>
      <button class="btn" id="logout-btn" type="button">ออกจากระบบ</button>
    </div>
  </div>

  <div class="cards">
    <div class="card"><div class="label">จำนวนผู้ตอบ</div><div class="num" id="stat-n">–</div></div>
    <div class="card"><div class="label">คะแนนเฉลี่ยรวม</div><div class="num" id="stat-mean">–<small> / 5.00</small></div></div>
    <div class="card"><div class="label">มีข้อเสนอแนะ</div><div class="num" id="stat-comments">–</div></div>
  </div>

  <h2 class="section-title">คำตอบทั้งหมด <span class="count" id="rows-count"></span></h2>
  <div id="rows"><div class="spinner">กำลังโหลด…</div></div>
</main>

<script>
(function () {
  "use strict";
  var API_BASE = new URLSearchParams(location.search).get('api') || 'https://md-ai-proxy-nook.netlify.app';
  var ADMIN = API_BASE + '/api/admin';
  var SURVEY = API_BASE + '/api/survey';
  var TKEY = 'md-admin-session';

  var loginView = document.getElementById('login-view');
  var dashView  = document.getElementById('dash-view');

  // ── session (sessionStorage: หายเมื่อปิดแท็บ) ──
  function getSession() {
    try {
      var s = JSON.parse(sessionStorage.getItem(TKEY) || 'null');
      if (s && s.token && s.exp && Date.now() < s.exp) return s;
    } catch (e) {}
    return null;
  }
  function setSession(s) { sessionStorage.setItem(TKEY, JSON.stringify(s)); }
  function clearSession() { sessionStorage.removeItem(TKEY); }

  function showLogin(msg) {
    dashView.style.display = 'none';
    loginView.style.display = 'grid';
    var m = document.getElementById('login-msg');
    m.className = 'msg' + (msg ? ' err' : '');
    m.textContent = msg || '';
    document.getElementById('pw').value = '';
  }
  function showDash() {
    loginView.style.display = 'none';
    dashView.style.display = 'block';
    loadDashboard();
  }

  // ── authenticated call to /api/admin ──
  function adminCall(action, extra) {
    var s = getSession();
    var headers = { 'Content-Type': 'application/json' };
    if (s) headers['Authorization'] = 'Bearer ' + s.token;
    var payload = { action: action };
    if (extra) for (var k in extra) payload[k] = extra[k];
    return fetch(ADMIN, { method: 'POST', headers: headers, body: JSON.stringify(payload) });
  }
  function handle401(res) {
    if (res.status === 401) { clearSession(); showLogin('เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่'); return true; }
    return false;
  }

  // ── login ──
  document.getElementById('login-form').addEventListener('submit', function (e) {
    e.preventDefault();
    var btn = document.getElementById('login-btn');
    var msg = document.getElementById('login-msg');
    var pw = document.getElementById('pw').value;
    btn.disabled = true; msg.className = 'msg'; msg.textContent = 'กำลังตรวจสอบ…';
    fetch(ADMIN, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'login', password: pw }) })
      .then(function (res) { return res.json().then(function (j) { return { ok: res.ok, j: j }; }); })
      .then(function (r) {
        if (!r.ok) throw new Error(r.j.error || 'เข้าสู่ระบบไม่สำเร็จ');
        setSession({ token: r.j.token, exp: r.j.exp });
        showDash();
      })
      .catch(function (err) { msg.className = 'msg err'; msg.textContent = err.message; })
      .finally(function () { btn.disabled = false; });
  });

  // ── dashboard ──
  function loadDashboard() {
    var note = document.getElementById('session-note');
    var s = getSession();
    if (s) {
      var mins = Math.round((s.exp - Date.now()) / 60000);
      note.textContent = 'เซสชันเหลือ ~' + mins + ' นาที';
    }
    document.getElementById('rows').innerHTML = '<div class="spinner">กำลังโหลด…</div>';

    // สถิติรวมจาก endpoint สาธารณะ
    fetch(SURVEY).then(function (r) { return r.json(); }).then(function (d) {
      document.getElementById('stat-n').textContent = d.n;
      document.getElementById('stat-mean').innerHTML =
        (d.overall && d.n ? d.overall.mean.toFixed(2) : '–') + '<small> / 5.00</small>';
    }).catch(function () {});

    // คำตอบดิบ (ต้องมี session)
    adminCall('list').then(function (res) {
      if (handle401(res)) return;
      return res.json().then(function (d) { renderRows(d.rows || []); });
    }).catch(function () {
      document.getElementById('rows').innerHTML = '<div class="empty-state">โหลดข้อมูลไม่สำเร็จ</div>';
    });
  }

  function renderRows(rows) {
    var wrap = document.getElementById('rows');
    wrap.innerHTML = '';
    document.getElementById('rows-count').textContent = '(' + rows.length + ')';
    document.getElementById('stat-comments').textContent =
      rows.filter(function (r) { return r.comment; }).length;

    if (!rows.length) { wrap.innerHTML = '<div class="empty-state">ยังไม่มีคำตอบ</div>'; return; }

    rows.forEach(function (r) {
      var item = document.createElement('div'); item.className = 'row-item';
      var body = document.createElement('div'); body.className = 'body';

      var meta = document.createElement('div'); meta.className = 'meta';
      meta.textContent = new Date(r.ts).toLocaleString('th-TH');           // textContent กัน XSS
      body.appendChild(meta);

      var demo = document.createElement('div'); demo.className = 'demo';
      [r.gender, r.age, r.status, r.freq].forEach(function (v) {
        var sp = document.createElement('span'); sp.textContent = v || '—'; // textContent กัน XSS
        demo.appendChild(sp);
      });
      body.appendChild(demo);

      var txt = document.createElement('div');
      if (r.comment) { txt.className = 'txt'; txt.textContent = r.comment; }  // textContent กัน XSS
      else { txt.className = 'txt empty'; txt.textContent = '(ไม่มีข้อเสนอแนะ)'; }
      body.appendChild(txt);

      var del = document.createElement('button'); del.className = 'btn-del';
      del.type = 'button'; del.textContent = '🗑 ลบ';
      del.addEventListener('click', function () { deleteRow(r.key, r.comment); });

      item.appendChild(body); item.appendChild(del);
      wrap.appendChild(item);
    });
  }

  function deleteRow(key, comment) {
    var label = comment ? ('"' + comment.slice(0, 40) + (comment.length > 40 ? '…' : '') + '"') : 'รายการนี้';
    if (!confirm('ลบคำตอบ ' + label + ' ถาวร?\nลบแล้วกู้คืนไม่ได้')) return;
    adminCall('delete', { key: key }).then(function (res) {
      if (handle401(res)) return;
      if (res.ok) loadDashboard();
      else res.json().then(function (j) { alert('ลบไม่สำเร็จ: ' + (j.error || res.status)); });
    });
  }

  // CSV: ดึงผ่าน session แล้วดาวน์โหลดฝั่ง client (token ไม่อยู่ใน URL)
  document.getElementById('csv-btn').addEventListener('click', function () {
    adminCall('csv').then(function (res) {
      if (handle401(res)) return;
      return res.blob().then(function (blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url; a.download = 'survey-responses.csv';
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
      });
    });
  });

  document.getElementById('refresh-btn').addEventListener('click', loadDashboard);
  document.getElementById('logout-btn').addEventListener('click', function () {
    clearSession(); showLogin('ออกจากระบบแล้ว');
  });

  // เริ่ม: มี session ใช้ได้อยู่ไหม
  if (getSession()) showDash(); else showLogin();
})();
</script>
</body>
</html>
