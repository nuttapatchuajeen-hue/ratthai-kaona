<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>รัฐไทยก้าวหน้า — เทคโนโลยีภาครัฐไทย</title>
  <link rel="icon" href="hub/images/logo.png" />
  <meta http-equiv="refresh" content="0; url=hub/index.html" />
  <script>location.replace('hub/index.html');</script>
  <style>
    html,body{margin:0;height:100%;background:#020508;color:#DCE8F0;
      font-family:system-ui,'Sarabun',sans-serif;display:grid;place-items:center}
    a{color:#00E5FF;text-decoration:none;font-weight:600}
    .box{text-align:center;padding:2rem}
    .spin{width:42px;height:42px;margin:0 auto 1.2rem;border:2px solid rgba(0,229,255,.2);
      border-top-color:#00E5FF;border-radius:50%;animation:s 1s linear infinite}
    @keyframes s{to{transform:rotate(360deg)}}
    p{line-height:1.7}
  </style>
</head>
<body>
  <div class="box">
    <div class="spin" aria-hidden="true"></div>
    <p>กำลังเข้าสู่ <strong>รัฐไทยก้าวหน้า</strong>…</p>
    <p><a href="hub/index.html">คลิกที่นี่ หากหน้าไม่เปลี่ยนอัตโนมัติ →</a></p>
  </div>
</body>
</html>
